# buf.yaml — конфигурация buf для управления protobuf-схемами.
#
# ПОЧЕМУ buf, а не голый protoc?
# - buf автоматически скачивает зависимости (google/protobuf/timestamp.proto)
# - Линтинг: проверяет что .proto файлы соответствуют best practices
# - Breaking change detection: не даст случайно сломать обратную совместимость
# - Единый инструмент вместо длинной команды protoc с кучей флагов
version: v2

modules:
  - path: proto

# Линтинг .proto файлов — помогает соблюдать стандарты именования
lint:
  use:
    - STANDARD

# Проверка обратной совместимости — критично в air-gap контуре,
# где агент и сервер обновляются НЕ одновременно
breaking:
  use:
    - FILE