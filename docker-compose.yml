# docker-compose.yml — Инфраструктура IoT платформы
#
# ПОЧЕМУ docker-compose, а не ручная установка?
# 1. Воспроизводимость: любой разработчик поднимает окружение одной командой
# 2. Изоляция: сервисы не загрязняют хост-систему
# 3. На проде в air-gap контуре образы переносят физически —
#    docker-compose.yml описывает точную конфигурацию, которую можно проверить

services:
  # ============================================================
  # TimescaleDB — расширение PostgreSQL для временных рядов
  # ============================================================
  # ПОЧЕМУ TimescaleDB, а не чистый PostgreSQL?
  # - Автоматическое партиционирование по времени (hypertables)
  # - Сжатие данных до 90% для старых данных
  # - Непрерывные агрегаты (continuous aggregates) — предрассчитанные метрики
  # - При этом это полноценный PostgreSQL: можно делать JOIN с обычными таблицами
  #
  # ПОЧЕМУ не InfluxDB / ClickHouse?
  # - InfluxDB: свой язык запросов (Flux), нет JOIN, нет транзакций
  # - ClickHouse: отличен для аналитики, но слаб для OLTP и event sourcing
  # - TimescaleDB = временные ряды + обычный SQL + транзакции в одной БД
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: pzmash-timescaledb
    environment:
      POSTGRES_USER: pzmash
      POSTGRES_PASSWORD: pzmash_secret
      POSTGRES_DB: pzmash_iot
    ports:
      # 5433 на хосте, потому что 5432 занят локальным PostgreSQL Windows.
      # Внутри контейнера по-прежнему 5432 (стандартный порт).
      - "5433:5432"
    volumes:
      # Персистентный том: данные переживают docker-compose down
      # БЕЗ этого каждый перезапуск = потеря всех данных
      - timescaledb_data:/var/lib/postgresql/data
      # Скрипты инициализации — выполняются ОДИН РАЗ при первом запуске
      - ./init-db:/docker-entrypoint-initdb.d
    # Health check проверяет РЕАЛЬНУЮ готовность БД, а не просто порт
    # ПОЧЕМУ pg_isready, а не curl на порт?
    # - Порт может быть открыт, но БД ещё инициализируется
    # - pg_isready проверяет, что PostgreSQL принимает подключения
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pzmash -d pzmash_iot"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # Redis — in-memory хранилище + брокер сообщений (pub/sub)
  # ============================================================
  # ПОЧЕМУ Redis для pub/sub, а не Kafka / RabbitMQ?
  # - Kafka: избыточен для нашего масштаба (~20 станков), требует ZooKeeper/KRaft
  # - RabbitMQ: хорош, но для fire-and-forget алертов pub/sub Redis проще
  # - Redis уже нужен для кэширования — не добавляем лишний сервис
  #
  # ВАЖНО: Redis pub/sub НЕ гарантирует доставку (fire-and-forget)
  # Это ОК для дашборда: если WebSocket отвалился, оператор просто
  # увидит данные при переподключении. Критичные алерты сохраняем в БД.
  redis:
    image: redis:7-alpine
    container_name: pzmash-redis
    ports:
      - "6379:6379"
    # alpine-образ — минимальный размер (~30MB vs ~130MB для полного)
    # В air-gap контуре размер образа имеет значение при физическом переносе
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # NATS — легковесный брокер сообщений для межсервисного общения
  # ============================================================
  # ПОЧЕМУ NATS, а не только gRPC?
  # - gRPC = синхронный запрос-ответ (клиент ждёт ответа)
  # - NATS = асинхронные сообщения (отправил и забыл / pub-sub / очередь)
  # - Агент отправляет телеметрию в NATS, а получатели обрабатывают
  #   в своём темпе — это и есть backpressure на уровне архитектуры
  #
  # ПОЧЕМУ не Kafka?
  # - NATS: ~10MB бинарь, запускается за 100мс, zero-config
  # - Kafka: JVM, ZooKeeper/KRaft, гигабайты RAM, сложная настройка
  # - Для 20 станков NATS более чем достаточен
  nats:
    image: nats:2-alpine
    container_name: pzmash-nats
    ports:
      # 4222 — порт для клиентских подключений
      - "4222:4222"
      # 8222 — HTTP мониторинг (GET /varz, /connz, /subsz)
      # Удобно для отладки: видно кто подключен и сколько сообщений
      - "8222:8222"
    # --js включает JetStream — персистентные очереди поверх NATS
    # Это даёт at-least-once доставку на стороне брокера
    command: ["--js", "--http_port", "8222"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # Prometheus — сбор и хранение метрик (Фаза 6)
  # ============================================================
  # ПОЧЕМУ Prometheus?
  # - Стандарт мониторинга в Cloud Native / Kubernetes (CNCF graduated)
  # - Pull-модель: Prometheus сам ходит на /metrics каждые 15с
  # - Мощный язык запросов PromQL для аналитики и алертинга
  # - Минимальная настройка: один конфиг-файл
  #
  # На собеседовании: "Как вы мониторите сервисы?"
  # Ответ: Prometheus scrapes /metrics endpoint, Grafana визуализирует.
  # RED-метрики: Rate (records/sec), Errors (errors_total), Duration (p95 latency).
  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: pzmash-prometheus
    ports:
      # 9090 — UI Prometheus (PromQL, графики, статус targets)
      - "9090:9090"
    volumes:
      # Конфиг Prometheus: какие targets скрейпить, с какой частотой
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Данные метрик — персистентный том
      - prometheus_data:/prometheus
    # extra_hosts позволяет контейнеру обращаться к хосту по имени.
    # ПОЧЕМУ? Go-сервер работает на хосте (go run), а не в контейнере.
    # host.docker.internal → IP хоста. Без этого Prometheus не достучится до /metrics.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================
  # Grafana — визуализация метрик и логов (Фаза 6)
  # ============================================================
  # ПОЧЕМУ Grafana, а не Kibana / Datadog?
  # - Open source, бесплатна для self-hosted
  # - Поддерживает Prometheus + Loki + десятки других datasources
  # - Provisioning: дашборды и datasources настраиваются через файлы
  # - В air-gap контуре — работает полностью offline
  #
  # На собеседовании: "Как вы визуализируете метрики?"
  # Ответ: Grafana с provisioned dashboards (JSON в git).
  # Datasources: Prometheus для метрик, Loki для логов.
  grafana:
    image: grafana/grafana:11.6.1
    container_name: pzmash-grafana
    ports:
      # 3000 — UI Grafana (дашборды, алерты, explore)
      - "3000:3000"
    environment:
      # Отключаем обязательную авторизацию для dev-окружения.
      # В проде: GF_SECURITY_ADMIN_PASSWORD через Docker secret.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      # Provisioning: автоматическая настройка datasources при старте
      - ./deployments/grafana/provisioning:/etc/grafana/provisioning:ro
      # Provisioning: JSON-дашборды загружаются автоматически
      - ./deployments/grafana/dashboards:/var/lib/grafana/dashboards:ro
      # Данные Grafana (настройки, пользователи, алерты)
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy

  # ============================================================
  # Loki — хранилище логов (Фаза 6, PLG-стек)
  # ============================================================
  # ПОЧЕМУ Loki, а не Elasticsearch?
  # - Ресурсы: ~10x меньше RAM (не индексирует содержимое, только labels)
  # - Простота: один бинарник vs кластер ES + настройка шардирования
  # - Стоимость: для наших объёмов (20 станков) ES = перерасход
  # - Интеграция: нативная поддержка в Grafana
  loki:
    image: grafana/loki:3.5.0
    container_name: pzmash-loki
    ports:
      - "3100:3100"
    volumes:
      - ./deployments/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Promtail — агент сбора логов (Фаза 6, PLG-стек)
  # ============================================================
  # Promtail читает stdout/stderr Docker-контейнеров и отправляет в Loki.
  # Аналог Filebeat (ELK) или Fluent Bit (EFK).
  #
  # АРХИТЕКТУРА:
  # Go-сервер → stdout (JSON) → Docker log driver → файлы на диске
  # → Promtail читает → отправляет в Loki → Grafana отображает
  promtail:
    image: grafana/promtail:3.5.0
    container_name: pzmash-promtail
    volumes:
      - ./deployments/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      # Docker socket — для обнаружения контейнеров (docker_sd_configs)
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Логи контейнеров на хосте
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

# Именованные тома хранят данные между перезапусками контейнеров
# ПОЧЕМУ именованные тома, а не bind mount (./data:/var/lib/...)?
# - Производительность: на Windows bind mount значительно медленнее
# - Безопасность: Docker управляет правами доступа
# - Портируемость: работает одинаково на Linux/Mac/Windows
volumes:
  timescaledb_data:
  prometheus_data:
  grafana_data:
  loki_data:
