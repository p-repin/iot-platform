// telemetry.proto — контракт данных между агентом и сервером.
//
// ПОЧЕМУ Protocol Buffers (protobuf), а не JSON?
// 1. Размер: protobuf в 3-10 раз компактнее JSON (критично при 20+ станках × 1 запись/сек)
// 2. Скорость: бинарная сериализация — нет парсинга строк, нет кавычек, нет пробелов
// 3. Типизация: схема описывает типы полей ЯВНО — string не пролезет вместо double
// 4. Совместимость: можно добавить новое поле, не ломая старых клиентов
//    (критично в air-gap контуре, где агент и сервер обновляются НЕ одновременно)
// 5. Кодогенерация: из одного .proto файла генерируются клиент и сервер
//    на Go, Python, Java и т.д. — один источник правды
//
// КОГДА JSON лучше?
// - Отладка руками (JSON читаем, protobuf — нет)
// - Публичные REST API (protobuf редко используют снаружи)
// - У нас внутренний сервис → protobuf идеален

// syntax = "proto3" — версия синтаксиса protobuf.
// proto3 vs proto2:
// - proto3 проще: нет required/optional (все поля optional по умолчанию)
// - proto3 убрал дефолтные значения — поле с нулевым значением не сериализуется
//   (экономия трафика)
// - proto3 — текущий стандарт, proto2 используют только в legacy-проектах
syntax = "proto3";

// Go-пакет для сгенерированного кода.
// ПОЧЕМУ длинный путь?
// Go использует полные пути модулей для импорта. Если указать просто "pb",
// то при импорте из другого пакета будет конфликт имён.
option go_package = "github.com/pzmash/iot-platform/internal/transport/grpc/pb";

// package определяет пространство имён в protobuf.
// Не путать с go_package — это для protobuf-совместимости между языками.
package telemetry;

import "google/protobuf/timestamp.proto";

// ============================================================
// Сообщения (Messages) — структуры данных
// ============================================================

// TelemetryRecord — одно показание с одного станка в один момент времени.
// Это атомарная единица данных в нашей системе.
message TelemetryRecord {
  // Уникальный ID записи для идемпотентности.
  // Агент генерирует UUID ДО отправки. При повторной отправке
  // (at-least-once) сервер видит тот же record_id и делает upsert.
  //
  // ПОЧЕМУ string, а не bytes для UUID?
  // - string читаемее при отладке (можно grep в логах)
  // - Разница в размере минимальна (36 байт string vs 16 байт bytes)
  // - В БД храним как UUID-тип, конвертация тривиальна
  string record_id = 1;

  // Идентификатор станка: "CNC-01", "LATHE-02" и т.д.
  string machine_id = 2;

  // Время снятия показания.
  // ПОЧЕМУ google.protobuf.Timestamp, а не int64 (unix timestamp)?
  // - Timestamp = секунды + наносекунды (int64 теряет наносекунды или требует конвенцию)
  // - Самодокументируемый: видя Timestamp, разработчик ЗНАЕТ что это время
  // - int64 неоднозначен: это секунды? миллисекунды? микросекунды?
  google.protobuf.Timestamp timestamp = 3;

  // Показания датчиков.
  // ПОЧЕМУ double, а не float?
  // - double = 64 бита, float = 32 бита
  // - Для промышленных датчиков нужна точность (например, вибрация 0.00342 мм/с)
  // - Разница в трафике = 4 байта на поле — несущественно при 1 записи/сек
  double temperature = 4;  // Температура (°C)
  double vibration = 5;    // Вибрация (мм/с)
  double pressure = 6;     // Давление (бар)
}

// TelemetryBatch — пакет записей для отправки.
// ПОЧЕМУ батч, а не по одной записи?
// 1. Сетевой overhead: каждый gRPC вызов = TCP handshake + HTTP/2 headers.
//    Отправка 100 записей одним вызовом вместо 100 вызовов — в разы эффективнее.
// 2. Транзакционность: сервер может записать весь батч в БД одной транзакцией.
// 3. Backpressure: если агент копит данные (WAL), он отправляет их батчами
//    при восстановлении связи — не по одной.
//
// РАЗМЕР БАТЧА: обычно 100-1000 записей. Слишком большой батч:
// - Долго сериализуется/десериализуется
// - Если упадёт на середине — все записи потеряны
// - gRPC по умолчанию ограничивает сообщение 4MB
message TelemetryBatch {
  repeated TelemetryRecord records = 1;

  // ID агента-отправителя — для логирования и мониторинга.
  // Если один из 20 агентов отправляет мусор, нужно знать какой именно.
  string agent_id = 2;
}

// IngestResponse — ответ сервера на приём батча.
message IngestResponse {
  // Сколько записей принято. Может быть меньше отправленных,
  // если часть уже была (idempotent upsert).
  int32 accepted_count = 1;

  // Ошибки по отдельным записям (если есть).
  // ПОЧЕМУ не просто один код ошибки на весь батч?
  // Если из 100 записей 1 невалидна — не нужно отбрасывать остальные 99.
  // Агент перешлёт только проблемные записи.
  repeated RecordError errors = 2;
}

// RecordError — ошибка обработки конкретной записи.
message RecordError {
  string record_id = 1;
  string message = 2;
}

// ============================================================
// Сервис (Service) — RPC методы
// ============================================================

// TelemetryService — gRPC сервис для приёма телеметрии.
//
// ПОЧЕМУ gRPC, а не REST?
// 1. HTTP/2: мультиплексирование, сжатие headers, бинарный протокол
// 2. Streaming: можно открыть поток и слать данные непрерывно (StreamTelemetry)
// 3. Кодогенерация: клиент и сервер генерируются из .proto — нет расхождений
// 4. Контракт: .proto файл = единый источник правды для всех команд
//
// КОГДА REST лучше?
// - Публичный API для внешних потребителей (браузер, curl)
// - У нас внутренний сервис → gRPC эффективнее
service TelemetryService {
  // Ingest — приём батча телеметрии (unary RPC).
  // Клиент отправляет один запрос, получает один ответ.
  // Используется при отправке накопленных данных из WAL.
  rpc Ingest(TelemetryBatch) returns (IngestResponse);

  // StreamTelemetry — потоковая отправка телеметрии (client streaming).
  // ПОЧЕМУ streaming?
  // В реальном времени агент отправляет данные непрерывно.
  // Без streaming: каждую секунду новый TCP handshake (дорого).
  // С streaming: одно соединение, данные текут непрерывно.
  //
  // client streaming = клиент шлёт поток, сервер отвечает ОДИН раз в конце.
  // Альтернатива: bidirectional streaming — сервер тоже шлёт данные обратно.
  // Нам хватает client streaming: серверу нечего отправлять агенту в процессе.
  rpc StreamTelemetry(stream TelemetryRecord) returns (IngestResponse);
}
